see_echo_strike:
  Cooldown: 4
  TriggerConditions:
  - (isPlayer || isLiving)
  Conditions:
  - chance{c=<math.enchant_level*0.05+0.10>}
  Skills:
  - particle{p=sonic_boom;a=1;hs=0;vs=0} @trigger
  - delay 12
  - damage{a=<math.damage*(0.20+(enchant_level*0.10))>;ii=true;pi=true;damagecause=MAGIC}
  - particle{p=enchanted_hit;a=20;hs=0.5;vs=0.6} @trigger
  - sound{s=entity.warden.sonic_boom;p=1.6;v=0.7} @self
