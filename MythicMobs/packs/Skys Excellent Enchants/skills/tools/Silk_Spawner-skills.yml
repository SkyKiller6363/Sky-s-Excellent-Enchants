see_silk_spawner:
  TargetConditions:
  - blocktype{types=spawner}
  Skills:
  - dropitem{i=spawner;onDrop=see_spawner_effects}

see_spawner_effects:
  Skills:
  - aura{duration=600;name=decapeffect;i=5;
    ontick=[ - particles{particle=happy_villager;amount=2;hS=0.1;vS=0.1;audience=caster} ];
    components=[ - glow{color=RED} ]}
  - sudo{skill=[ - jump{v=0.5;repeat=12;repeatI=50}]}

  - sound{s=entity.experience_orb.pickup;v=0.6;p=1.4;audience=caster}

