see:bane_of_netherspawn: # must be in the nether biomes to get from enchanting table
  Display: Bane of Netherspawn
  Description: Increased Damage to Nether Mobs
  Rarity: UNCOMMON
  MinLevel: 1
  MaxLevel: 5
  ValidSlots:
  - HAND
  SupportedItems: '#minecraft:enchantable/weapon'
  ConflictingEnchants:
  - minecraft:sharpness
  - minecraft:smite
  - see:villager_defense
  AnvilCost: 3
  Options:
    Enabled: true
    Treasure: false
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: false
  Enchanting:
    Weight: 10
    MinCost:
      Base: 10
      PerLevel: 4
    Promised: true
    BookOffer: true
    PrimaryItems:
    - '#minecraft:enchantable/melee_weapon'
    Conditions:
    - biome{b=NETHER_WASTES,BASALT_DELTAS,CRIMSON_FOREST,WARPED_FOREST}
  Skills:
  - damage{a=<math:enchant_level*2.5>} @trigger ~onAttack ?~entitytype{types=BLAZE,WITHER_SKELETON,GHAST,HOGLIN,MAGMA_CUBE,PIGLIN,PIGLIN_BRUTE,STRIDER,ZOMBIFIED_PIGLIN}
  - particle{particle=enchanted_hit;amount=10;hs=0.5;vs=0.6} @triggerlocation{y=1}
    ~onAttack ?~entitytype{types=BLAZE,WITHER_SKELETON,GHAST,HOGLIN,MAGMA_CUBE,PIGLIN,PIGLIN_BRUTE,STRIDER,ZOMBIFIED_PIGLIN}
  - potion{type=WEAKNESS;d=<math:enchant_level*20+10>;level=<math:enchant_level-1>}
    @trigger ~onAttack ?~entitytype{types=BLAZE,WITHER_SKELETON,GHAST,HOGLIN,MAGMA_CUBE,PIGLIN,PIGLIN_BRUTE,STRIDER,ZOMBIFIED_PIGLIN}
