see:confusing_arrows:
  Display: Confusing Arrows
  Description: Applies Nauseau to the target
  Rarity: UNCOMMON
  MinLevel: 1
  MaxLevel: 3
  ValidSlots:
  - HAND
  SupportedItems: '#mythicenchants:bows_and_crossbows'
  ConflictingEnchants:
  - see:bomber
  - see:dragonfire_arrows
  - see:ender_bow
  - see:ghast
  AnvilCost: 5
  Options:
    Enabled: true
    Treasure: false
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: true
  Enchanting:
    Weight: 4
    MinCost:
      Base: 20
      PerLevel: 5
    Promised: true
    BookOffer: true
    PrimaryItems:
    - '#minecraft:enchantable/bow'
  Skills:
  - particle{p=Spell_Mob_Ambient;hs=0.1;vs=0.1;a=2;color=#551D4A;power=1;repeat=600;repeatI=1}
    @shotprojectile ~onShoot ?batchedchance{chance=<math.enchant_level*0.04+0.04>;consume=2}
  - potion{type=NAUSEA;l=<math:enchant_level-1>;duration=<math:enchant_level*40>}
    @trigger{targetself=true} ~onBowHit ?batchedchance{chance=<math.enchant_level*0.04+0.04>;consume=2}
  - particle{particle=reddust;amount=1;y=-1;audience=caster} @self ~onBowMiss ?batchedchance{chance=<math.enchant_level*0.04+0.04>;consume=2}
