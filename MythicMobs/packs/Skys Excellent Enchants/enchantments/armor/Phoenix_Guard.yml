  ValidSlots:
  - CHEST
  SupportedItems: '#minecraft:enchantable/chest_armor'
  AnvilCost: 6
  Options:
    Enabled: true
    Treasure: false
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: true
  Enchanting:
