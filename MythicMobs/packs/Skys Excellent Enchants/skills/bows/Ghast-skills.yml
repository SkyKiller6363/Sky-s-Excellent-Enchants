see_ghast:
  Conditions:
  - chance{c=<math.enchant_level*0.15+0.35>}
  - hasitem{item=GUNPOWDER;amount=>0;strict=true;vanilla=true} orElseCast see_ghast-no_ammo
  Skills:
  - cancelevent
  - sound{s=item.firecharge.use;v=1;p=1.2} @self
  - effect:particles{p=flame;amount=18;hS=0.25;vS=0.25;speed=0.08} @self
  - shootfireball{type=large;y=<math.enchant_level*0.5>;v=<math.enchant_level*0.4+1.6>;i=false;playsound=true} @targetlocation

see_ghast-no_ammo:
  Skills:
  - am{m="<#d45353>Need more gunpowder..."} @self

