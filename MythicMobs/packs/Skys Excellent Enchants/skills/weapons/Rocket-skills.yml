see_rocket:
  Cooldown: 5
  Conditions:
    - chance{c=<math.enchant_level*0.03+0.15>}
  Skills:
    - sudoskill{s=see_rocketaura}
see_rocketaura:
  Skills:
    - aura{aura=see_rocket;duration=<math.enchant_level*8>;
      onStart=[
        - jump{v=<math.enchant_level*0.4+0.3>;delay=1}
        ];
      onEnd=[
        - randomskill{
          skills=
          [ - firework{type=BALL;d=0;f=true;tr=false;color=#FF0000;fcolors=#0000FF} ],
          [ - firework{type=BALL_LARGE;d=0;f=false;tr=true;color=#FF0000;fcolors=#0000FF} ],
          [ - firework{type=BURST;d=0;f=true;tr=true;color=#FF0000;fcolors=#0000FF} ],
          [ - firework{type=CREEPER;d=0;f=false;tr=false;color=#FF0000;fcolors=#0000FF} ],
          [ - firework{type=STAR;d=0;f=true;tr=false;color=#FF0000;fcolors=#0000FF} ]
          } 
        - fakeexplode
        ];
      onTick=[
        - particle{p=fireworks_spark;a=4;vs=1;hs=0}
      ]}


