see_explosive_arrows:
  Conditions:
    - hasitem{i=GUNPOWDER;vanilla=true;strict=true;amount=>1} orElseCast see_explosive_arrows-no_ammo
  Skills:
    - takeitem{item=GUNPOWDER;amount=1;strict=true;vanillaonly=true}
    - particle{p=block_crack;material=TNT;hs=0.1;vs=0.1;a=2;repeat=600;repeatI=1} @shotprojectile

see_explosive_arrows-hit:
  Conditions:
    - hasitem{i=GUNPOWDER;vanilla=true;strict=true;amount=>0} 
  Skills:
    - explode{yield=<math.enchant_level*1>;blockdamage=false;fire=false} 

see_explosive_arrows-no_ammo:
  Skills:
  - am{m="<#d45353>Need more gunpowder..."} @self

