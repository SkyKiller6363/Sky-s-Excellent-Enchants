see:riptide_reach:
  Display: Riptide Reach
  Description: Increases trident reach and surges targets with ocean force
  Rarity: RARE
  MinLevel: 1
  MaxLevel: 3
  ValidSlots:
  - HAND
  SupportedItems: minecraft:trident
  AnvilCost: 5
  Options:
    Enabled: true
    Treasure: false
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: true
  Enchanting:
    Weight: 4
    MinCost:
      Base: 22
      PerLevel: 5
    Promised: true
    BookOffer: true
  Attributes:
    MainHand:
    - entity_interaction_range <math.enchant_level*0.35> ADD
  Skills:
  - skill{s=see_riptide_reach} @trigger ~onAttack
  - skill{s=see_riptide_reach} @trigger ~onProjectileHit
