see_salvage_hook:
  Conditions:
  - chance{c=<math.enchant_level*0.06+0.12>}
  Skills:
  - dropitem{i=IRON_NUGGET <math.enchant_level>} @selflocation
  - summon{type=see_fishing_xp;a=<math.enchant_level>} @selflocation
  - particle{p=happy_villager;a=15;hs=0.4;vs=0.4} @self
  - sound{s=entity.fishing_bobber.retrieve;p=1.2;v=0.8} @self
