see:water_breathing:
  Display: Water Breathing
  Description: Provides the wearer with Water Breathing
  Rarity: UNCOMMON
  MinLevel: 1
  MaxLevel: 1
  ValidSlots:
  - HEAD
  SupportedItems: '#minecraft:enchantable/head_armor'
  AnvilCost: 5
  Options:
    Enabled: true
    Treasure: false
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: true
  Enchanting:
    Weight: 5
    MinCost:
      Base: 20
      PerLevel: 0
    Promised: true
    BookOffer: true
  Skills: # if d=600 is not working on your version, change it to like 600 instead 
    - potion{type=WATER_BREATHING;l=0;d=600;p=false;i=false} @self ~onTimer:20 ?inblock{types=WATER}
    - potion{type=WATER_BREATHING;l=0;d=600;p=false;i=false} @self ~onEquip ?inblock{types=WATER}
    - potionclear{type=WATER_BREATHING} @self ~onUnequip


