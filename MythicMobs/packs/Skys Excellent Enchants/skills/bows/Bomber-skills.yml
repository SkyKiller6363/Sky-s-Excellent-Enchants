see_bomber:
  Conditions:
    - chance{c=<math.enchant_level*0.20+0.15>}
    - hasitem{i=TNT;amount=<1;vanilla=true;exact=true} castInstead see_bomber-no_ammo

    # Sniper increases the TNT launch velocity.
    # Highest level should be checked first.
    - hasenchant{enchantment=see:sniper;level=5} castInstead see_bomber-sniper5
    - hasenchant{enchantment=see:sniper;level=4} castInstead see_bomber-sniper4
    - hasenchant{enchantment=see:sniper;level=3} castInstead see_bomber-sniper3
    - hasenchant{enchantment=see:sniper;level=2} castInstead see_bomber-sniper2
    - hasenchant{enchantment=see:sniper;level=1} castInstead see_bomber-sniper1

  Skills:
    - cancelevent
    - skill{s=see_bomber-consume}
    - summon{type=see_BomberTNT;onSummon=[ - sudo{skill=[ - propel{v=2.5*<skill.var.bow-tension>} ];target=@targetlocation} ]} @targetlocation{maxdistance=1}

see_bomber-no_ammo:
  Skills:
    - am{m="<#d45353>Missing TNT"} @self



see_bomber-consume:
  Skills:
    - consumeuseddurability{a=1}
    - takeitem{i=TNT;a=1;vanilla=true;exact=true}
    - sound{s=entity.tnt.primed}

    - am{m=<#e91919>Bomber} @self ?varisset{var=caster.enchant_action_message}
    - sound{s=entity.experience_orb.pickup;v=0.6;p=1.4;audience=caster} @self ?varisset{var=caster.enchant_action_message}

