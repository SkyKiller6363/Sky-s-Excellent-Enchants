see:curse_of_death:
  Display: Curse of Death
  Description: If you kill a player, you have a chance of dying too.
  Rarity: RARE
  MinLevel: 1
  MaxLevel: 3
  ValidSlots:
  - HAND
  SupportedItems: '#minecraft:enchantable/weapon'
  AnvilCost: 5
  Options:
    Enabled: true
    Curse: true
    Treasure: true
    RandomLoot: true
    Tradeable: false
    TradedEquipment: false
    MobSpawnEquipment: true
  Skills:
  - skill{s=see_curse_of_death} @self ~onPlayerKill










