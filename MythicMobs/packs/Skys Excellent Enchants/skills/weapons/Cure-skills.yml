see_cure:
  Conditions:
  - chance{c=<math.enchant_level*0.33>}
  TargetConditions:
  - entitytype{type=ZOMBIE_VILLAGER} castInstead see_cure-zombie_villager
  - entitytype{type=ZOMBIFIED_PIGLIN} castInstead see_cure-zombie_pigman

see_cure-zombie_villager:
  Skills:
  - particle{particle=happy_villager;a=10;vs=0.5;hs=0.5;y=1}
  - curezombievillager{mode=INSTANT}

see_cure-zombie_pigman:
  Skills:
  - particle{particle=happy_villager;a=10;vs=0.5;hs=0.5;y=1}
  - sudo{skill=[ - summon{type=PIGLIN;usetargetpitch=true;usetargetyaw=true;sio=false;sip=false} @self ]}
  - remove
