see_abyssal_current:
  Cooldown: 5
  TriggerConditions:
  - (isPlayer || isLiving)
  Conditions:
  - chance{c=<math.enchant_level*0.06+0.10>}
  Skills:
  - potion{type=SLOW;duration=<math.enchant_level*30+50>;level=<math.enchant_level-1>} @trigger
  - potion{type=WEAKNESS;duration=<math.enchant_level*25+40>;level=0} @trigger
  - damage{a=<math.enchant_level+1>;pi=true;ii=true;damagecause=DROWNING} @trigger
  - particle{p=bubble;a=35;hs=0.5;vs=0.8} @trigger
  - particle{p=splash;a=25;hs=0.5;vs=0.5} @trigger
  - sound{s=entity.drowned.ambient_water;p=0.8;v=0.8} @self
