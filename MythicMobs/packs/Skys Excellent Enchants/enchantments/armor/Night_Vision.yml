see:night_vision:
  Display: Night Vision
  Description: Provides the wearer with <b>Permanent</b> Night Vision
  Rarity: UNCOMMON
  MinLevel: 1
  MaxLevel: 1
  ValidSlots:
  - HEAD
  SupportedItems: '#minecraft:enchantable/head_armor'
  AnvilCost: 5
  Options:
    Enabled: true
    Treasure: false
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: false
  Enchanting:
    Weight: 5
    MinCost:
      Base: 20
      PerLevel: 0
    Promised: true
    BookOffer: true
  Skills: # if d=600 is not working on your version, change it to like 600 instead 
    - potion{type=NIGHT_VISION;l=0;d=600;p=false;i=false} @self ~onTimer:200
    - potion{type=NIGHT_VISION;l=0;d=600;p=false;i=false} @self ~onEquip
    - potionclear{type=NIGHT_VISION} @self ~onUnequip
