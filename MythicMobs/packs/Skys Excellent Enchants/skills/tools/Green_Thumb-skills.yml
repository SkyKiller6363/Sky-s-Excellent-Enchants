see_green_thumb:
  TargetConditions:
  - blocktype{types=WHEAT,CARROTS,POTATOES,BEETROOTS,NETHER_WART,COCOA}
  Conditions:
  - chance{c=<math.enchant_level*0.08+0.10>}
  Skills:
  - boneMeal{delay=1} @randomlocationsneartargets{r=2;amount=<math.enchant_level*2>;surface=true}
  - boneMeal{delay=3} @randomlocationsneartargets{r=2;amount=<math.enchant_level*2>;surface=true}
  - particle{p=happy_villager;a=12;hs=0.3;vs=0.35} @randomlocationsneartargets{r=2;amount=<math.enchant_level*2>;surface=true}
  - sound{s=item.bone_meal.use;p=1.2;v=1} @self
