see_riptide_reach:
  Cooldown: 5
  TriggerConditions:
  - (isPlayer || isLiving)
  Conditions:
  - chance{c=<math.enchant_level*0.05+0.10>}
  Skills:
  - throw{velocity=<math.enchant_level*1.5+3>;velocityY=<math.enchant_level*0.4+0.6>} @trigger
  - damage{a=<math.enchant_level+1>;pi=true;ii=true;damagecause=DROWNING} @trigger
  - particle{p=splash;a=35;hs=0.6;vs=0.7} @trigger
  - sound{s=item.trident.riptide_1;p=1.2;v=0.8} @self

see_riptide_reach-throw:
  Cooldown: 5
  TriggerConditions:
  - (isPlayer || isLiving)
  Conditions:
  - chance{c=<math.enchant_level*0.05+0.10>}
  Skills:
  - throw{velocity=<math.enchant_level*1.5+3>;velocityY=<math.enchant_level*0.4+0.6>;fromorigin=true} @trigger
  - damage{a=<math.enchant_level+1>;pi=true;ii=true;damagecause=DROWNING} @trigger
  - particle{p=splash;a=35;hs=0.6;vs=0.7} @trigger
  - sound{s=item.trident.riptide_1;p=1.2;v=0.8} @self
