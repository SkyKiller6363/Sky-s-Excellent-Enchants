see:kamikadze:
  Display: Kamikadze
  Description: Creates an explosion on death
  Rarity: RARE
  MinLevel: 1
  MaxLevel: 5
  ValidSlots:
  - CHEST
  SupportedItems: '#minecraft:enchantable/chest_armor'
  AnvilCost: 5
  Options:
    Enabled: true
    Treasure: false
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: true
  Enchanting:
    Weight: 4
    MinCost:
      Base: 10
      PerLevel: 5
    Promised: false
    BookOffer: true
  Skills:
  - explode{yield=<math.math.enchant_level*1>;blockdamage=true} @self ~onDeath
  - enchant{id=see:kamikadze;mode=remove;level=1} @self ~onDeath
