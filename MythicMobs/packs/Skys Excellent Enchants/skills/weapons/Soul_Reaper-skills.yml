see_soul_reaper:
  Cooldown: 3
  Conditions:
  - chance{c=<math.enchant_level*0.08+0.20>}
  Skills:
  - consume{d=0;h=<math.enchant_level+2>} @self
  - potion{type=STRENGTH;l=0;duration=<math.enchant_level*30+40>;p=false;i=false} @self
  - particle{p=soul;a=20;hs=0.5;vs=0.8} @selflocation{y=1}
  - sound{s=entity.soul_escape;p=1.1;v=1;audience=caster} @self ?varisset{var=caster.enchant_action_message}
  - actionmessage{m="<#6d48ff>Soul Reaper <gray>fed on the fallen."} @self ?varisset{var=caster.enchant_action_message}
