see_anglers_arm:
  Cooldown: 5
  Conditions:
  - chance{c=<math.enchant_level*0.05+0.10>}
  Skills:
  - pull{velocity=<math.enchant_level*1.5+3>} @trigger
  - particle{p=water_splash;a=25;hs=0.45;vs=0.45} @trigger
  - sound{s=entity.fishing_bobber.retrieve;p=1.5;v=0.9} @self

see_anglers_arm_fail:
  Conditions:
  - chance{c=<math.enchant_level*0.04+0.08>}
  Skills:
  - summon{type=see_fishing_xp;a=1} @selflocation
  - particle{p=splash;a=12;hs=0.4;vs=0.2} @selflocation
