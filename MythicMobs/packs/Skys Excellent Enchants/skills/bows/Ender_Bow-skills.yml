see_ender_bow: # remove the hasitem condition and takeitem mechanics below if you don't want to charge an ender pearl
  Conditions:
  - hasitem{i=ENDER_PEARL;a=<1} castInstead ender_bow-no_ammo

  # Sniper increases Ender Bow projectile velocity.
  # Highest level should be checked first.
  - hasenchant{enchantment=see:sniper;level=5} castInstead see_ender_bow-sniper5
  - hasenchant{enchantment=see:sniper;level=4} castInstead see_ender_bow-sniper4
  - hasenchant{enchantment=see:sniper;level=3} castInstead see_ender_bow-sniper3
  - hasenchant{enchantment=see:sniper;level=2} castInstead see_ender_bow-sniper2
  - hasenchant{enchantment=see:sniper;level=1} castInstead see_ender_bow-sniper1

  Skills:
  - cancelevent
  - shoot{type=enderpearl;velocity=0.7;damage=1;duration=600;i=1;maxDistance=512;syo=1.3} @targetlocation
  - takeitem{i=ENDER_PEARL;a=1;vanillaonly=true}

see_ender_bow_land:
  Skills:
  - teleport @triggerlocation{fo=-1;yo=0.25}
  - damage{a=5;damagecause=FALL}
  - velocity{relative=true;velocityx=-0.3to0.3;velocityz=-0.3to0.3;velocityy=0.2to0.5;mode=ADD;delay=1}
  - sound{s=entity.player.teleport}

ender_bow-no_ammo:
  Skills:
  - am{m="<#d45353>Missing Ender Pearl"} @self



