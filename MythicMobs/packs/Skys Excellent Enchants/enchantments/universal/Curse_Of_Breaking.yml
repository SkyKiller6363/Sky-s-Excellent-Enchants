see:curse_of_breaking:
  Display: Curse of Breaking
  Description: When you use your item, it will do additional durability damage
  Rarity: UNCOMMON
  MinLevel: 1
  MaxLevel: 3
  ValidSlots:
  - HAND
  - OFFHAND
  - HEAD
  - CHEST
  - LEGS
  - FEET
  SupportedItems: '#mythicenchants:universal'
  AnvilCost: 5
  Options:
    Enabled: true
    Cursed: true
    Treasure: false
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: true
  Skills:
  - skill{s=curse_of_breaking} @self ~onBlockBreak
  - skill{s=curse_of_breaking} @self ~onAttack
  - skill{s=curse_of_breaking} @self ~onDamaged
  Enchanting:
    Weight: 1
    MinCost:
      Base: 25
      PerLevel: 5
    Promised: true
    BookOffer: true
