  - HAND
  Options:
    Enabled: true
    Treasure: false
    RandomLoot: true
    Tradeable: false
    TradedEquipment: false
    MobSpawnEquipment: true
  Enchanting:
    Weight: 2
    MinCost:
      Base: 20
      PerLevel: 4
    Promised: true
    BookOffer: true
  Skills:
  - skill{s=see_bomber;sync=true} @self ~onShoot
