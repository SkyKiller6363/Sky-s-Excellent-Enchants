see:obsidian_shield:
  Display: Obsidian Shield
  Description: Provides permanent Fire Resistance
  Rarity: RARE
  MinLevel: 1
  MaxLevel: 1
  ValidSlots:
  - HEAD
  SupportedItems: '#minecraft:enchantable/head_armor'
  AnvilCost: 5
  Options:
    Enabled: true
    Treasure: false
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: true
  Enchanting:
    Weight: 3
    MinCost:
      Base: 24
      PerLevel: 0
    Promised: true
    BookOffer: true
  Skills:
  - potion{type=FIRE_RESISTANCE;l=0;d=-1;p=false;i=false} @self ~onTimer:200
  - potion{type=FIRE_RESISTANCE;l=0;d=-1;p=false;i=false} @self ~onEquip
  - ignite{d=0} @self ~onTimer:40
  - potionclear{type=FIRE_RESISTANCE} @self ~onUnEquip
