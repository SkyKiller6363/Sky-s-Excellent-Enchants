see_hardened:
  Cooldown: 3
  Conditions:
  - chance{c=<math.enchant_level*0.07+0.09>}
  TriggerConditions:
  - (isPlayer || isLiving)
  Skills:
    - potion{type=RESISTANCE;l=<math.enchant_level-1>;duration=<math.enchant_level*20+20>}
    - particle{particle=totem_of_undying;a=5;hs=0.2;vs=0.5} @selflocation{y=1}
    - sound{s=item.shield.block;p=0.8;v=0.5} @self
    - am{m=<#252a39>Hardened} @self ?varisset{var=caster.enchant_action_message}
    - sound{s=entity.experience_orb.pickup;v=0.6;p=1.4;audience=caster} @self ?varisset{var=caster.enchant_action_message}

