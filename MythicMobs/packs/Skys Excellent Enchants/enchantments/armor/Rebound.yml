see:rebound: # Must be traded or found on random loot to obtain
  Display: Rebound
  Description: Allows you to crouch and Bounce when falling to avoid fall damage
  Rarity: RARE
  MinLevel: 1
  MaxLevel: 1
  ValidSlots:
  - FEET
  SupportedItems: '#minecraft:enchantable/foot_armor'
  AnvilCost: 5
  Options:
    Enabled: true
    Treasure: true
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: false
  Skills:
  - skill{s=see_rebound} @self ~onCrouch
