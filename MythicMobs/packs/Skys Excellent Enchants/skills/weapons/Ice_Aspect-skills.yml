see_ice_aspect:
  Cooldown: 5
  Conditions:
    - chance{c=<math.enchant_level*0.03+0.15>}
  Skills:
    - potion{type=slowness;l=<math.enchant_level-1>;duration=<math.enchant_level*20+30>}
    - aura{duration=<math.enchant_level*20+10>;i=1;onTick=[  - freeze{ticks=280} - damage{a=<math:enchant_level*1>;cd=2;damagecause=FREEZE} ]}

    - am{m=<#46c9e0>Ice Aspect} @self ?varisset{var=caster.enchant_action_message}
    - sound{s=entity.experience_orb.pickup;v=0.6;p=1.4;audience=caster} @self ?varisset{var=caster.enchant_action_message}


