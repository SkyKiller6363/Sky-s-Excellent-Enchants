see:ghast:
  Display: Ghast
  Description: Arrows turn into ghast fireballs
  Rarity: ULTRA_RARE
  MinLevel: 1
  MaxLevel: 3
  ValidSlots:
  - HAND
  SupportedItems: '#minecraft:enchantable/bow'
  ConflictingEnchants:
  - minecraft:infinity
  - minecraft:power
  - minecraft:punch
  - minecraft:flame
  - see:bomber
  - see:dragonfire_arrows
  - see:ender_bow
  - see:confusing_arrows
  - see:darkness_arrows
  - see:electrified_arrows
  - see:explosive_arrows
  - see:hover
  - see:poisoned_arrows
  - see:sniper
  - see:vampiric_arrows
  - see:withered_arrows
  AnvilCost: 10
  Options:
    Enabled: true
    Treasure: true
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: true
  Enchanting:
    Weight: 1
    MinCost:
      Base: 28
      PerLevel: 8
    Promised: true
    BookOffer: true
    PrimaryItems:
    - '#minecraft:enchantable/bow'
    - '#minecraft:enchantable/crossbow'
  Skills:
  - skill{s=see_ghast;sync=true} @self ~onShoot
