see:treasure_current:
  Display: Treasure Current
  Description: The current can wash rare ocean loot to your failed casts
  Rarity: RARE
  MinLevel: 1
  MaxLevel: 3
  ValidSlots:
  - HAND
  SupportedItems: minecraft:fishing_rod
  AnvilCost: 6
  Options:
    Enabled: true
    Treasure: true
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: true
  Enchanting:
    Weight: 2
    MinCost:
      Base: 28
      PerLevel: 8
    Promised: true
    BookOffer: true
  Skills:
  - skill{s=see_treasure_current} @self ~onFishFail
