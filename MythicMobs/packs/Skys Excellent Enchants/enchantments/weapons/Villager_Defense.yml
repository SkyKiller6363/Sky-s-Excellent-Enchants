see:villager_defense: # must be inside of a village to get this from the enchanting table
  Display: Villager Defense
  Description: Increased Damage to Illager Mobs
  Rarity: UNCOMMON
  MinLevel: 1
  MaxLevel: 5
  ValidSlots:
  - HAND
  SupportedItems: '#minecraft:enchantable/weapon'
  ConflictingEnchants:
  - minecraft:sharpness
  - minecraft:smite
  - see:bane_of_netherspawn
  AnvilCost: 5
  Options:
    Enabled: true
    Treasure: false
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: true
  Enchanting:
    Weight: 10
    MinCost:
      Base: 20
      PerLevel: 2
    MaxCost:
      Base: 30
      PerLevel: 0
    Promised: true
    BookOffer: true
    PrimaryItems:
    - '#minecraft:enchantable/melee_weapon'
    Conditions:
    - structure{s=minecraft:village_*}
  Skills:
  - damage{a=<math:enchant_level*2.5>} @trigger ~onAttack ?~entitytype{types=EVOKER,ILLUSIONER,PILLAGER,VINDICATOR,RAVAGER,VEX,WITCH}
  - particle{particle=enchanted_hit;amount=10;hs=0.5;vs=0.6} @triggerlocation{y=1}
    ~onAttack ?~entitytype{types=EVOKER,ILLUSIONER,PILLAGER,VINDICATOR,RAVAGER,VEX,WITCH}
  - potion{type=WEAKNESS;d=<math:enchant_level*20+10>;level=<math:enchant_level-1>}
    @trigger ~onAttack ?~entitytype{types=EVOKER,ILLUSIONER,PILLAGER,VINDICATOR,RAVAGER,VEX,WITCH}
