see:darkness_arrows: # Requires to be NOT day to get in enchanting table
  Display: Darkness Arrows
  Description: Applies Darkness to the target
  Rarity: UNCOMMON
  MinLevel: 1
  MaxLevel: 3
  ValidSlots:
  - HAND
  SupportedItems: '#minecraft:enchantable/bow'
  ConflictingEnchants:
  - see:bomber
  - see:dragonfire_arrows
  - see:ender_bow
  - see:ghast
  AnvilCost: 5
  Options:
    Enabled: true
    Treasure: false
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: true
  Enchanting:
    Weight: 4
    MinCost:
      Base: 20
      PerLevel: 5
    Promised: true
    BookOffer: true
    Conditions:
    - ( night || dusk || dawn )
    PrimaryItems:
    - '#minecraft:enchantable/bow'
  Skills:
  - particle{p=Spell_Mob_Ambient;hs=0.1;vs=0.1;a=2;color=#292721;power=1;repeat=600;repeatI=1}
    @shotprojectile ~onShoot ?batchedchance{chance=<math.enchant_level*0.04+0.04>;consume=2}
  - potion{type=DARKNESS;l=<math:enchant_level-1>;duration=<math:enchant_level*20+20>}
    @trigger ~onBowHit ?batchedchance{chance=<math.enchant_level*0.04+0.04>;consume=2}
  - particle{particle=reddust;amount=1;y=-1;audience=caster} @self ~onBowMiss ?batchedchance{chance=<math.enchant_level*0.04+0.04>;consume=2}
