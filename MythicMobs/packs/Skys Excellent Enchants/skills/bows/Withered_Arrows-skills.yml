see_withered_arrows:
  TriggerConditions:
  - (isPlayer || isLiving)
  Skills:
  - potion{type=WITHER;l=<math.enchant_level-1>;duration=<math.enchant_level*20+20>} @trigger
  - particle{particle=smoke;a=28;hs=0.35;vs=0.5;speed=0.04} @triggerlocation{y=1}
  - particle{particle=soul;a=12;hs=0.3;vs=0.45;speed=0.04} @triggerlocation{y=1}
  - sound{s=entity.wither.hurt;p=1.7;v=0.45} @trigger
