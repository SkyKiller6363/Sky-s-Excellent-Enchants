see:infernus:
  Display: Infernus
  Description: Triedents set targets on fire
  Rarity: UNCOMMON
  MinLevel: 1
  MaxLevel: 3
  ValidSlots:
  - HAND
  SupportedItems: minecraft:trident
  AnvilCost: 3
  Options:
    Enabled: true
    Treasure: false
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: true
  Enchanting:
    Weight: 5
    MinCost:
      Base: 20
      PerLevel: 5
    MaxCost:
      Base: 30
      PerLevel: 0
    Promised: true
    BookOffer: true
  Skills:
  - ignite{d=<math.enchant_level*20+10>} @trigger ~onAttack
  - ignite{d=<math.enchant_level*20+10>} @trigger ~onProjectileHit
