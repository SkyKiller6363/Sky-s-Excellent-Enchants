see:elemental_protection:
  Display: Elemental Protection
  Description: Reduces Elemnetal Damage
  Rarity: RARE
  AnvilCost: 10
  MinLevel: 1
  MaxLevel: 4
  ValidSlots:
  - HEAD
  - CHEST
  - LEGS
  - FEET
  SupportedItems: '#minecraft:enchantable/armor'
  Options:
    Enabled: true
    Treasure: true
    RandomLoot: false
    Tradeable: false
    TradedEquipment: false
    MobSpawnEquipment: true
  Enchanting:
    Weight: 4
    MinCost:
      Base: 20
      PerLevel: 4
    Promised: true
    BookOffer: true
  Skills:
  - reducedamage{a=<math.damage*0.04*enchant_level>;cap=0.80;cause=DRAGON_BREATH,FIRE,FIRE_TICK,FREEZE,HOT_FLOOR,LAVA,LIGHTNING,MAGIC,POISON,WITHER}
    @self ~onDamaged
