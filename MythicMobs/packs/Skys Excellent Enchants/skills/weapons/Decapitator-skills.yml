see_decapitator_mob:
  Conditions:
  - haspack{pack=Decapitator_Variants} castInstead decapitator_mob_variant
  Skills:
  - skill{s=see_decapitator_mob_base}

see_decapitator_mob_base:
  Conditions:
  - hasenchant{enchantment=looting;level=3} castInstead see_decapitator_mob-looting3
  - hasenchant{enchantment=looting;level=2} castInstead see_decapitator_mob-looting2
  - hasenchant{enchantment=looting;level=1} castInstead see_decapitator_mob-looting1
  - chance{c=<math.enchant_level*0.01>}
  Skills:
  - skill{s=see_decapitator_mob-mob_drop}

see_decapitator_mob-looting1:
  Conditions:
  - chance{c=<math.enchant_level*0.01+0.015>}
  Skills:
  - skill{s=see_decapitator_mob-mob_drop}
see_decapitator_mob-looting2:
  Conditions:
  - chance{c=<math.enchant_level*0.01+0.025>}
  Skills:
  - skill{s=see_decapitator_mob-mob_drop}
see_decapitator_mob-looting3:
  Conditions:
  - chance{c=<math.enchant_level*0.01+0.035>}
  Skills:
  - skill{s=see_decapitator_mob-mob_drop}


see_decapitator_player:
  Skills:
  - decapitate

see_decapitator_effects:
  Skills:
  - sudo{skill=[ - hide{d=600} @server ]}
  - delay 1
  - sudo{skill=[ - showentity @trigger ];cat=true}
  - aura{duration=600;name=decapeffect;i=5;
    ontick=[ - particles{particle=happy_villager;amount=2;hS=0.1;vS=0.1;audience=caster} ];
    components=[ - glow{color=RED} ]}
  - sudo{skill=[ - jump{v=0.5;repeat=12;repeatI=50}]}

  - sound{s=entity.experience_orb.pickup;v=0.6;p=1.4;audience=caster}


