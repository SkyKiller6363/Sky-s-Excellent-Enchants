see:curse_of_embers:
  Display: Curse Of Embers
  Description: Taking damage can ignite you and scorch nearby enemies
  Rarity: RARE
  MinLevel: 1
  MaxLevel: 3
  ValidSlots:
  - ARMOR
  SupportedItems: '#minecraft:enchantable/equippable'
  AnvilCost: 7
  Options:
    Enabled: true
    Cursed: true
    Treasure: true
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: true
  Enchanting:
    Weight: 1
    MinCost:
      Base: 26
      PerLevel: 8
    Promised: true
    BookOffer: true
  Skills:
  - skill{s=see_curse_of_embers} @self ~onDamaged
