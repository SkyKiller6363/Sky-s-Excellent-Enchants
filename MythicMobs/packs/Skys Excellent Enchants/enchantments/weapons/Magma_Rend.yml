see:magma_rend:
  Display: Magma Rend
  Description: Rips through enemies with burning magma
  Rarity: UNCOMMON
  MinLevel: 1
  MaxLevel: 3
  ValidSlots:
  - HAND
  SupportedItems: '#minecraft:enchantable/weapon'
  ConflictingEnchants:
  - minecraft:fire_aspect
  AnvilCost: 5
  Options:
    Enabled: true
    Treasure: false
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: true
  Enchanting:
    Weight: 4
    MinCost:
      Base: 18
      PerLevel: 5
    Promised: true
    BookOffer: true
    PrimaryItems:
    - '#minecraft:enchantable/melee_weapon'
  Skills:
  - skill{s=see_magma_rend} @trigger ~onAttack
