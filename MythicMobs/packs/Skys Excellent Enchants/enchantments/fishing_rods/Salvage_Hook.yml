see:salvage_hook:
  Display: Salvage Hook
  Description: Failed fishing attempts can salvage useful junk and XP
  Rarity: UNCOMMON
  MinLevel: 1
  MaxLevel: 3
  ValidSlots:
  - HAND
  SupportedItems: minecraft:fishing_rod
  AnvilCost: 4
  Options:
    Enabled: true
    Treasure: false
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: true
  Enchanting:
    Weight: 5
    MinCost:
      Base: 16
      PerLevel: 5
    Promised: true
    BookOffer: true
  Skills:
  - skill{s=see_salvage_hook} @self ~onFishFail
