see_ice_shield:
  Cooldown: 3
  Conditions:
  - chance{c=<math.enchant_level*0.07+0.15>}
  TriggerConditions:
  - (isPlayer || isliving)
  Skills:
    - potion{type=slowness;l=<math.enchant_level-1>;duration=<math.enchant_level*20+20>}
    - aura{duration=<math.enchant_level*20+20>;i=1;onTick=[  
      - freeze{ticks=280} 
      - damage{a=1;cd=2;damagecause=FREEZE} 
      - sound{s=entity.player.hurt_freeze;cd=2} 
      ]}
    - am{m=<#35f8eb>Ice Shield} @self ?varisset{var=caster.enchant_action_message}
    - sound{s=entity.experience_orb.pickup;v=0.6;p=1.4;audience=caster} @self ?varisset{var=caster.enchant_action_message}


