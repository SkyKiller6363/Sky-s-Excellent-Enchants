see:death_bringer:
  Display: Death Bringer
  Description: Low-health hits can smash enemies back with deathly force
  Rarity: VERY_RARE
  MinLevel: 1
  MaxLevel: 3
  ValidSlots:
  - HAND
  SupportedItems: '#minecraft:enchantable/weapon'
  AnvilCost: 7
  Options:
    Enabled: true
    Treasure: false
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: true
  Enchanting:
    Weight: 2
    MinCost:
      Base: 26
      PerLevel: 8
    Promised: true
    BookOffer: true
    PrimaryItems:
    - '#minecraft:enchantable/melee_weapon'
  Skills:
  - skill{s=see_death_bringer} @trigger ~onAttack
