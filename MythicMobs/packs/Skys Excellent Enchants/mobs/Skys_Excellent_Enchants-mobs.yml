see_BomberTNT:
  Type: tnt
  Options:
    ExplosionYield: 4
    FuseTicks: 80




Flame_Walker_Shulker:
  Type: SHULKER
  Options:
    Invisible: true
    NoAI: true
    Invincible: true
    # VisibleByDefault: false
    Color: ORANGE
  Skills:
  - remove{delay=2} @self ~onSpawn
  - remove @self ~onSpawn ?!inblock{types=LAVA}

  - particle{particle=lava;a=1;y=1} @self ~onSpawn 0.15
  - particle{particle=soul_fire_flame;a=2;hs=0.5;y=0.9} @self ~onSpawn 0.2 
  - particle{particle=small_flame;a=2;hs=0.5;y=0.9} @self ~onSpawn


