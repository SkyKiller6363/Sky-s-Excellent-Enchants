see_treasure_current:
  Conditions:
  - chance{c=<math.enchant_level*0.03+0.04>}
  Skills:
  - vskill{s=[
    - dropitem{i=PRISMARINE_CRYSTALS 1-<math.enchant_level>} @selflocation
    - dropitem{i=NAUTILUS_SHELL 1} @selflocation ?chance{c=<math.enchant_level*0.08>}
    - summon{type=see_fishing_xp;a=<math.enchant_level+1>} @selflocation
    - particle{p=nautilus;a=35;hs=0.6;vs=0.6} @self
    - sound{s=block.conduit.activate;p=1.6;v=0.7} @self
    ]}
