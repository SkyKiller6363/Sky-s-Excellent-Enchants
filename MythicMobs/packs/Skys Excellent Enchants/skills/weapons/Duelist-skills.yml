see_duelist:
  Cooldown: 4
  TriggerConditions:
  - (isPlayer || isLiving)
  Conditions:
  - chance{c=<math.enchant_level*0.05+0.10>}
  Skills:
  - potion{type=SLOW;l=0;duration=<math.enchant_level*15+20>} @trigger
  - potion{type=WEAKNESS;l=0;duration=<math.enchant_level*10+20>} @trigger
  - particle{p=sweep_attack;a=3;hs=0.4;vs=0.4} @trigger
  - sound{s=entity.player.attack.sweep;p=1.3;v=0.7} @self
