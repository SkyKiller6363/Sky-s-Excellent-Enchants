see:glass_cannon:
  Display: Glass Cannon
  Description: Greatly increases attack damage while reducing max health when held
  Rarity: VERY_RARE
  MinLevel: 1
  MaxLevel: 3
  ValidSlots:
  - HAND
  SupportedItems: '#minecraft:enchantable/weapon'
  AnvilCost: 8
  Options:
    Enabled: true
    Treasure: false
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: false
  Enchanting:
    Weight: 2
    MinCost:
      Base: 30
      PerLevel: 8
    Promised: true
    BookOffer: true
    PrimaryItems:
    - '#minecraft:enchantable/melee_weapon'
  Attributes:
    MainHand:
    - ATTACK_DAMAGE <math.enchant_level*1.25> ADD
    - MAX_HEALTH -<math.enchant_level*2> ADD
  Skills:
  - skill{s=see_glass_cannon} @trigger ~onAttack
