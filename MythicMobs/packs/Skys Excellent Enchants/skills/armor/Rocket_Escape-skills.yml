see_rocket_escape:
  Cooldown: 30
  Conditions:
  - healthpercent{p=<25%}
  - chance{c=<math.(enchant_level*0.12)+0.18>}
  Skills:
  - sudoskill{s=see_rocket_escape_aura}

see_rocket_escape_aura:
  Skills:
  - aura{aura=see_rocket_escape;duration=100;
    onStart=[
      - jump{v=<math.enchant_level*0.4+0.3>;delay=1}
      - propel{v=<math.enchant_level*0.4+0.3>;delay=10} @forward
      ];
    onTick=[
      - particle{p=fireworks_spark;a=4;vs=1;hs=0}
      ];
    components=[
      - onDamaged{cancelevent=true;damagecause=FALL;onDamaged=[ removeaura{aura=see_rocket_escape}]}
      ]}
