see:explosive_arrows:
  Display: Explosive Arrows
  Description: Explodes on arrow hit
  Rarity: UNCOMMON
  MinLevel: 1
  MaxLevel: 5
  ValidSlots:
  - HAND
  SupportedItems: '#mythicenchants:bows_and_crossbows'
  ConflictingEnchants:
  - see:bomber
  - see:dragonfire_arrows
  - see:ender_bow
  - see:ghast
  AnvilCost: 5
  Options:
    Enabled: true
    Treasure: false
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: true
  Enchanting:
    Weight: 4
    MinCost:
      Base: 20
      PerLevel: 5
    Promised: true
    BookOffer: true
    PrimaryItems:
    - '#minecraft:enchantable/bow'
  Skills:
  - skill{s=see_explosive_arrows} @self ~onShoot ?batchedchance{chance=<math.enchant_level*0.04+0.04>;consume=2}
  - skill{s=see_explosive_arrows-hit} @trigger ~onBowHit ?batchedchance{chance=<math.enchant_level*0.04+0.04>;consume=2}
  - particle{particle=reddust;amount=1;y=-1;audience=caster} @self ~onBowMiss ?batchedchance{chance=<math.enchant_level*0.04+0.04>;consume=2}
