see:thrifty:
  Display: Thrifty
  Description: Chance to drop the mobs spawn egg on kill
  Rarity: RARE
  MinLevel: 1
  MaxLevel: 5
  ValidSlots:
  - HAND
  SupportedItems: '#minecraft:enchantable/weapon'
  AnvilCost: 10
  Options:
    Enabled: true
    Cursed: false
    Treasure: true
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: false
  Enchanting:
    BookOffer: true
    Weight: 2
    MinCost:
      Base: 20
      PerLevel: 5
    MaxCost: 30
    Promised: true
    PrimaryItems:
    - '#minecraft:enchantable/melee_weapon'
  Skills:
  - skill{s=see_thrifty_mob} @trigger ~onKill
