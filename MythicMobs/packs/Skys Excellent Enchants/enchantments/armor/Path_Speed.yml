see:path_speed:
  Display: Path Speed
  Description: Increases speed on dirt path blocks
  Rarity: UNCOMMON
  MinLevel: 1
  MaxLevel: 3
  ValidSlots:
  - FEET
  SupportedItems: '#minecraft:enchantable/foot_armor'
  AnvilCost: 5
  Options:
    Enabled: true
    Treasure: false
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: false
  Enchanting:
    Weight: 5
    MinCost:
      Base: 12
      PerLevel: 8
    Promised: true
    BookOffer: true
  Skills:
  - soulspeed{a=<math.0.3+0.105*enchant_level>;op=MULTIPLY;blocks=DIRT_PATH,COARSE_DIRT,PACKED_MUD,MUD_BRICKS} @self ~onTimer:10
