see:water_walker: # only found on random chest loot
  Display: Water Walker
  Description: Allows the wearer to walk on water
  Rarity: ULTRA_RARE
  AnvilCost: 10
  MinLevel: 1
  MaxLevel: 1
  ValidSlots:
  - FEET
  SupportedItems: '#minecraft:enchantable/foot_armor'
  ConflictingEnchants:
  - minecraft:frost_walker
  - see:flame_walker
  Options:
    Enabled: true
    Treasure: true
    RandomLoot: true
    Tradeable: false
    TradedEquipment: false
    MobSpawnEquipment: false
  Skills:
  - summon{type=Water_Walker_Shulker;origin=@selflocation{y=-1}} @blocksnearorigin{r=1.5;ry=2;blocktypes=WATER,KELP,KELP_PLANT,BUBBLE_COLUMN} ~onTimer:1 ?!crouching ?onBlock{block=WATER,KELP,KELP_PLANT,BUBBLE_COLUMN}
