see:ice_shield:
  Display: Ice Shield
  Description: Applies Slowness to the attacker
  Rarity: UNCOMMON
  MinLevel: 1
  MaxLevel: 3
  ValidSlots:
  - CHEST
  SupportedItems: '#minecraft:enchantable/chest_armor'
  AnvilCost: 5
  Options:
    Enabled: true
    Treasure: false
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: true
  Enchanting:
    Weight: 4
    MinCost:
      Base: 20
      PerLevel: 4
    Promised: true
    BookOffer: true
    Conditions: # To get from enchanting table, must be in a cold biome
      - biome{b=cold_ocean,deep_cold_ocean,deep_dark, deep_frozen_ocean,frozen_ocean,frozen_peaks,frozen_river,
        grove,ice_spikes,jagged_peaks, old_growth_pine_taiga,old_growth_spruce_taiga,
        snowy_beach,snowy_plains,snowy_slopes,snowy_taiga,stony_peaks, taiga,windswept_forest,windswept_gravelly_hills,windswept_hills}
  Skills:
  - skill{s=see_ice_shield} @trigger ~onDamaged
