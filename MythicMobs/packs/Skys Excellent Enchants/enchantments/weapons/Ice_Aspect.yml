see:ice_aspect:
  Display: Ice Aspect
  Description: Freezes the target
  Rarity: UNCOMMON
  MinLevel: 1
  MaxLevel: 3
  ValidSlots:
  - HAND
  SupportedItems: '#minecraft:enchantable/weapon'
  AnvilCost: 3
  Options:
    Enabled: true
    Treasure: false
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: true
  Enchanting:
    Weight: 5
    MinCost:
      Base: 20
      PerLevel: 5
    MaxCost:
      Base: 30
      PerLevel: 0
    Promised: true
    BookOffer: true
    PrimaryItems:
    - '#minecraft:enchantable/melee_weapon'
  Skills:
  - skill{s=see_ice_aspect} @trigger ~onAttack
