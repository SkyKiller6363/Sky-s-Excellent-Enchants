see:dragon_heart: # Only found on Mob Equipment
  Display: Dragon Heart
  Description: Increases Health
  Rarity: ULTRA_RARE
  AnvilCost: 10
  MinLevel: 1
  MaxLevel: 5
  ValidSlots:
  - CHEST
  SupportedItems: '#minecraft:enchantable/chest_armor'
  Options:
    Enabled: true
    Treasure: true
    RandomLoot: false
    Tradeable: false
    TradedEquipment: false
    MobSpawnEquipment: true
  Attributes:
    Chest:
    - MAX_HEALTH <math.enchant_level*2> ADD
