see:dragonfire_arrows:
  Display: Dragonfire Arrows
  Description: Applies Dragon''s Breath on arrow hit and landing
  Rarity: RARE
  MinLevel: 1
  MaxLevel: 3
  ValidSlots:
  - HAND
  SupportedItems: '#minecraft:enchantable/bow'
  ConflictingEnchants:
  - minecraft:infinity
  - minecraft:power
  - minecraft:punch
  - minecraft:flame
  - see:bomber
  - see:ender_bow
  - see:ghast
  - see:confusing_arrows
  - see:darkness_arrows
  - see:electrified_arrows
  - see:explosive_arrows
  - see:hover
  - see:poisoned_arrows
  - see:sniper
  - see:vampiric_arrows
  - see:withered_arrows
  AnvilCost: 5
  Options:
    Enabled: true
    Treasure: false
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: true
  Enchanting:
    Weight: 3
    MinCost:
      Base: 22
      PerLevel: 5
    Promised: true
    BookOffer: true
    PrimaryItems:
    - '#minecraft:enchantable/bow'
  Skills:
  - skill{s=see_dragonfire_arrows_shoot;sync=true} @trigger ~onShoot
