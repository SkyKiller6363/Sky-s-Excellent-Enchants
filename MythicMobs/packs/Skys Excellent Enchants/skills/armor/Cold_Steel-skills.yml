see_cold_steel:
  Cooldown: 3
  Conditions:
  - chance{c=<math.enchant_level*0.07+0.15>}
  TriggerConditions:
  - (isPlayer || isliving{})
  Skills:
    - potion{type=MINING_FATIGUE;l=<math.enchant_level-1>;duration=<math.enchant_level*20>}
    - particle{particle=snowflake;a=12;vs=0.3;hs=0.5} @triggerlocation{y=1}
    - sound{s=block.anvil.hit;volume=0.5;pitch=1.8}
    - am{m=<#4c7fb3>Cold Steel} @self ?varisset{var=caster.enchant_action_message}
    - sound{s=entity.experience_orb.pickup;v=0.6;p=1.4;audience=caster} @self ?varisset{var=caster.enchant_action_message}

