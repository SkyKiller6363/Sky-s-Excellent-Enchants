see:bomber:
  Display: Bomber
  Description: Chance to shoot primed TNT
  MinLevel: 1
  MaxLevel: 3
  ConflictingEnchants:
  - minecraft:infinity
  - see:dragonfire_arrows
  - see:ender_bow
  - see:ghast
  - see:confusing_arrows
  - see:darkness_arrows
  - see:electrified_arrows
  - see:explosive_arrows
  - see:hover
  - see:poisoned_arrows
  - see:sniper
  - see:vampiric_arrows
  - see:withered_arrows
