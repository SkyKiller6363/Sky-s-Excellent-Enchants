see:sniper:
  Display: Sniper
  Description: Increases Arrow Velocity
  Rarity: UNCOMMON
  MinLevel: 1
  MaxLevel: 5
  ValidSlots:
  - HAND
  SupportedItems: '#mythicenchants:bows_and_crossbows'
  ConflictingEnchants:
  - see:bomber
  - see:dragonfire_arrows
  - see:ender_bow
  - see:ghast
  AnvilCost: 5
  Options:
    Enabled: true
    Treasure: false
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: true
  Enchanting:
    Weight: 4
    MinCost:
      Base: 18
      PerLevel: 3
    Promised: true
    BookOffer: true
    PrimaryItems:
    - '#minecraft:enchantable/bow'
  Skills:
  - sudo{skill=[ - velocity{mode=MULTIPLY;vx=<math.1+enchant_level*0.1>;vy=<math.1+enchant_level*0.1>;vz=<math.1+enchant_level*0.1>}
    @self ];delay=1} @shotProjectile ~onShoot
