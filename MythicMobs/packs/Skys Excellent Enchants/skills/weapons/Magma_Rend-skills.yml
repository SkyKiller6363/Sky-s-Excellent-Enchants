see_magma_rend:
  Cooldown: 3
  TriggerConditions:
  - (isPlayer || isLiving)
  Conditions:
  - chance{c=<math.enchant_level*0.05+0.15>}
  Skills:
  - ignite{d=<math.enchant_level*30+40>}
  - damage{a=<math.enchant_level>;ii=true;pi=true;damagecause=FIRE}
  - particle{p=lava;a=8;hs=0.35;vs=0.5}
  - sound{s=block.lava.pop;p=1.1;v=1;audience=caster} @self
