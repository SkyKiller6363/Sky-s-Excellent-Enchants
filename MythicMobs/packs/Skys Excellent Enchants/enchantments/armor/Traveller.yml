see:traveller:
  Display: Traveller
  Description: Increases Step Height
  Rarity: UNCOMMON
  MinLevel: 1
  MaxLevel: 2
  ValidSlots:
  - FEET
  SupportedItems: '#minecraft:enchantable/foot_armor'
  AnvilCost: 5
  Options:
    Enabled: true
    Treasure: false
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: true
  Enchanting:
    Weight: 4
    MinCost:
      Base: 25
      PerLevel: 5
    Promised: true
    BookOffer: true
  Attributes:
    Feet:
    - STEP_HEIGHT <math.enchant_level*0.5> ADD
