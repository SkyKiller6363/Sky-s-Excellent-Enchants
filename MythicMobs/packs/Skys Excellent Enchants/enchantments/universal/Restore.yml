see:restore:
  Display: Restore 
  Description: Has a chance to save your item from breaking
  Rarity: ULTRA_RARE
  MinLevel: 1
  MaxLevel: 3
  ValidSlots:
  - HAND
  - OFFHAND
  - HEAD
  - CHEST
  - LEGS
  - FEET
  SupportedItems: '#mythicenchants:universal'
  AnvilCost: 5
  Options:
    Enabled: true
    Curse: false
    Treasure: true
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: true
  Skills:
  - skill{s=see_restore} @self ~onBlockBreak
  - skill{s=see_restore} @self ~onAttack
  - skill{s=see_restore} @self ~onDamaged
  Enchanting:
    Weight: 1
    MinCost:
      Base: 25
      PerLevel: 5
    Promised: true
    BookOffer: true




