see_rebound: 
  Cooldown: 7
  Conditions:
    - fallspeed{s=>0}
  Skills:
    - aura{auraname=rebound;i=1;duration=120;charges=3;
      components=[
        - onDamaged{damagetype=FALL;ce=true;onDamaged=see_rebound_Activate}
        ]}

see_rebound_Activate:
  Conditions: 
    - crouching 
  Skills:
    - particle{p=slime;a=30;hs=0.25}
    - particle{p=Falling_Spore_Blossom;a=20;hs=1}
    - particle{p=spore_blossom_air;a=20;hs=2}
    - jump{v=<caster.velocity>}
    - sound{s=block.slime_block.fall}
