see_saturation:
  Conditions:
    - chance{c=<math.enchant_level*0.03+0.15>}
    - itemdurability{amount=>0;slot=TRIGGER}
  Skills:
    - feed{s=<math.enchant_level*2+1>} 

    - particle{p=Happy_Villager;a=15;hs=0.5;vs=0.5;audience=caster} @selflocation{y=1.3}
    - sound{s=block.amethyst_block.chime;audience=caster} @self
    - reducedurability{a=1;breakitem=false}
    - am{m=<#e2aa29>Saturation} @self ?varisset{var=caster.enchant_action_message}
    - sound{s=entity.experience_orb.pickup;v=0.6;p=1.4;audience=caster} @self ?varisset{var=caster.enchant_action_message}
