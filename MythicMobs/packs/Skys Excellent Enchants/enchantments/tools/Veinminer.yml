see:veinminer: # Might be premium. still unsure
  Display: Veinminer
  Description: Mines the ore vein
  Rarity: UNCOMMON
  MinLevel: 1
  MaxLevel: 3
  ValidSlots:
  - HAND
  SupportedItems: '#minecraft:pickaxes'
  AnvilCost: 5
  Options:
    Enabled: true
    Treasure: false
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: true
  Enchanting:
    Weight: 4
    MinCost:
      Base: 20
      PerLevel: 4
    Promised: true
    BookOffer: true
  Skills:
  - skill{s=see_veinminer;origin=@targetBlock{}} @BNO{r=<math.enchant_level*1+1>;sort=FURTHEST}
    ~onBlockBreak ?!crouching


