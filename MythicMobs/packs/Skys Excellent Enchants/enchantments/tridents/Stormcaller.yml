see:stormcaller:
  Display: Stormcaller
  Description: Thrown tridents can call down lightning on impact
  Rarity: RARE
  MinLevel: 1
  MaxLevel: 3
  ValidSlots:
  - HAND
  SupportedItems: minecraft:trident
  AnvilCost: 6
  Options:
    Enabled: true
    Treasure: false
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: true
  Enchanting:
    Weight: 3
    MinCost:
      Base: 24
      PerLevel: 7
    Promised: true
    BookOffer: true
  Skills:
  - skill{s=see_stormcaller} @trigger ~onProjectileHit
  - skill{s=see_stormcaller_melee} @trigger ~onAttack
