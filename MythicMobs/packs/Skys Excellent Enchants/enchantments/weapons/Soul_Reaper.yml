see:soul_reaper:
  Display: Soul Reaper
  Description: Kills briefly empower and heal you
  Rarity: RARE
  MinLevel: 1
  MaxLevel: 3
  ValidSlots:
  - HAND
  SupportedItems: '#minecraft:enchantable/weapon'
  AnvilCost: 6
  Options:
    Enabled: true
    Treasure: true
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: true
  Enchanting:
    Weight: 2
    MinCost:
      Base: 24
      PerLevel: 6
    Promised: true
    BookOffer: true
    PrimaryItems:
    - '#minecraft:enchantable/melee_weapon'
  Skills:
  - skill{s=see_soul_reaper} @self ~onKill
  - skill{s=see_soul_reaper} @self ~onPlayerKill
