see:grow:
  Display: Grow
  Description: Makes the wearer a bit bigger
  Rarity: UNCOMMON
  MinLevel: 1
  MaxLevel: 5
  ValidSlots:
  - HEAD
  SupportedItems: '#minecraft:enchantable/head_armor'
  ConflictingEnchants:
  - see:shrink
  AnvilCost: 5
  Options:
    Enabled: true
    Treasure: false
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: true
  Enchanting:
    Weight: 4
    MinCost:
      Base: 16
      PerLevel: 4
    Promised: true
    BookOffer: true
  Attributes:
    Head:
    - SCALE <math.enchant_level*0.15> ADD
    - JUMP_STRENGTH <math.enchant_level*0.02> ADD
  Skills:
  - particle{particle=wax_on;hs=0.3;vs=0.5;a=20} @selflocation{y=1} ~onEquip
  - particle{particle=wax_off;hs=0.3;vs=0.5;a=20} @selflocation{y=1} ~onUnEquip
