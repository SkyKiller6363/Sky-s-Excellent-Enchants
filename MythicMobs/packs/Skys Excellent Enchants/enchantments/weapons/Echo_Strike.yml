see:echo_strike:
  Display: Echo Strike
  Description: Your hits can echo for delayed magic damage
  Rarity: RARE
  MinLevel: 1
  MaxLevel: 3
  ValidSlots:
  - HAND
  SupportedItems: '#minecraft:enchantable/sharp_weapon'
  AnvilCost: 5
  Options:
    Enabled: true
    Treasure: false
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: true
  Enchanting:
    Weight: 3
    MinCost:
      Base: 22
      PerLevel: 5
    Promised: true
    BookOffer: true
    PrimaryItems:
    - '#minecraft:enchantable/melee_weapon'
  Skills:
  - skill{s=see_echo_strike} @trigger ~onAttack
