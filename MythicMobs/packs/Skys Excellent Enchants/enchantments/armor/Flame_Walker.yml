see:flame_walker: # only found on random chest loot
  Display: Flame Walker
  Description: Allows the wearer to walk on lava, and immunity to magma damage
  Rarity: ULTRA_RARE
  AnvilCost: 10
  MinLevel: 1
  MaxLevel: 1
  ValidSlots:
  - FEET
  SupportedItems: '#minecraft:enchantable/foot_armor'
  ConflictingEnchants:
  - minecraft:frost_walker
  - see:water_walker
  Options:
    Enabled: true
    Treasure: true
    RandomLoot: true
    Tradeable: false
    TradedEquipment: false
    MobSpawnEquipment: false
  Skills:
  - summon{type=Flame_Walker_Shulker;origin=@selflocation{y=-1}} @blocksnearorigin{r=1.5;ry=2;blocktypes=LAVA}
    ~onTimer:1 ?!crouching ?onblock{types=LAVA}
  - cancelevent{sync=true} @self ~onDamaged ?damagecause{cause=HOT_FLOOR}
