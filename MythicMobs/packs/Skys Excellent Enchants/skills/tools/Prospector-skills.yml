see_prospector:
  TargetConditions:
  - blocktype{types=IRON_ORE,DIAMOND_ORE,DEEPSLATE_IRON_ORE,DEEPSLATE_DIAMOND_ORE,GOLD_ORE,DEEPSLATE_GOLD_ORE,NETHER_GOLD_ORE,EMERALD_ORE,DEEPSLATE_EMERALD_ORE,DEEPSLATE_LAPIS_ORE,LAPIS_ORE,REDSTONE_ORE,DEEPSLATE_REDSTONE_ORE,NETHER_QUARTZ_ORE,COAL_ORE,DEEPSLATE_COAL_ORE,COPPER_ORE,DEEPSLATE_COPPER_ORE,ANCIENT_DEBRIS}
  Conditions:
  - chance{c=<math.enchant_level*0.08+0.12>}
  Skills:
  - summon{type=lucky_miner_xp;a=<math.enchant_level+1>}
  - particle{p=happy_villager;a=10;hs=0.35;vs=0.35} @origin
  - sound{s=entity.experience_orb.pickup;p=1.6;v=0.8;audience=caster} @self ?varisset{var=caster.enchant_action_message}
