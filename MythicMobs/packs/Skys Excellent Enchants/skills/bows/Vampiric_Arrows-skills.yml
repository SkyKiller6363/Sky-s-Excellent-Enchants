# Formula notes:
# Level 1 = 50% of damage converted
# Level 2 = 66% of damage converted
# Level 3 = 83% of damage converted

see_vampiric_arrows: 
  TriggerConditions:
  - (isPlayer || isLiving)
  Skills:
    - particle{particle=damage_indicator;a=8;hs=0.25;vs=0.35;speed=0.04} @triggerlocation{y=1}

    - particle{particle=heart;a=7;hs=0.35;vs=0.45;speed=0.03} @selflocation{y=1}
    - particle{particle=cherry_leaves;a=12;hs=0.35;vs=0.4;speed=0.02} @selflocation{y=1}
    - consume{d=0;h=<math.damage/3*(1+(enchant_level*0.5))>} @trigger

    - actionmessage{repeat=1;repeatI=10;m="<#f32a23>Vampire <gray>healed for <#ba0404><math.damage/3*(1+(enchant_level*0.5))/2> ❤"} ?varisset{var=caster.enchant_action_message}
    - sound{s=block.chain.break;p=1.5;v=2;audience=caster} @self ?varisset{var=caster.enchant_action_message}



