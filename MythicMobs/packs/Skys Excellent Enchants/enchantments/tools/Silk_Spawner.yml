see:silk_spawner:
  Display: Silk Spawner
  Description: Allows you to pick up monster spawners
  Rarity: RARE
  MinLevel: 1
  MaxLevel: 1
  ValidSlots:
  - HAND
  SupportedItems: '#minecraft:pickaxes'
  AnvilCost: 5
  Options:
    Enabled: true
    Treasure: false
    RandomLoot: false
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: true
  Enchanting:
    Weight: 4
    MinCost:
      Base: 20
      PerLevel: 4
    Promised: true
    BookOffer: true
  Skills:
  - skill{s=see_silk_spawner} @targetblock ~onBlockBreak
