see:darkness_cloak:
  Display: Darkness Cloak
  Description: Applies Darkness to the attacker
  Rarity: UNCOMMON
  MinLevel: 1
  MaxLevel: 3
  ValidSlots:
  - CHEST
  SupportedItems: '#minecraft:enchantable/chest_armor'
  AnvilCost: 5
  Options:
    Enabled: true
    Treasure: false
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: true
  Enchanting:
    Weight: 4
    MinCost:
      Base: 20
      PerLevel: 4
    Promised: true
    BookOffer: true
    Conditions: # means it has to be not daytime for this enchantment to appear in the enchanting table
      - ( night || dusk || dawn )
  Skills:
  - skill{s=see_darkness_cloak} @trigger ~onDamaged
