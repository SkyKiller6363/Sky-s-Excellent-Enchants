see:anglers_arm:
  Display: Angler's Arm
  Description: Increases fishing rod reach and can yank hooked creatures harder
  Rarity: RARE
  MinLevel: 1
  MaxLevel: 3
  ValidSlots:
  - HAND
  SupportedItems: minecraft:fishing_rod
  AnvilCost: 5
  Options:
    Enabled: true
    Treasure: false
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: true
  Enchanting:
    Weight: 4
    MinCost:
      Base: 18
      PerLevel: 5
    Promised: true
    BookOffer: true
  Attributes:
    MainHand:
    - entity_interaction_range <math.enchant_level*0.50> ADD
  Skills:
  - skill{s=see_anglers_arm} @trigger ~onFishBite
  - skill{s=see_anglers_arm_fail} @self ~onFishFail
