

see_miniblock-drop_effects:
  Skills:
  - sudo{skill=[ - hide{d=600} @server ]}
  - delay 1
  - sudo{skill=[ - showentity @trigger ];cat=true}
  - aura{duration=600;name=miniblock;i=5;
    ontick=[ - particles{particle=happy_villager;amount=2;hS=0.1;vS=0.1;audience=caster} ];
    components=[ - glow{color=RED} ]}
  - sudo{skill=[ - jump{v=0.5;repeat=12;repeatI=50}]}

  - sound{s=entity.experience_orb.pickup;v=0.6;p=1.4;audience=caster}


see_miniblock-stone_blocks:
  Conditions:
  - hasenchant{enchantment=fortune;level=3} castInstead see_miniblock-stone_blocks-fortune3
  - hasenchant{enchantment=fortune;level=2} castInstead see_miniblock-stone_blocks-fortune2
  - hasenchant{enchantment=fortune;level=1} castInstead see_miniblock-stone_blocks-fortune1
  - chance{c=<math.enchant_level*0.03+0.01>}
  Skills:
  - skill{s=see_miniblock-stone_blocks2}


see_miniblock-stone_blocks-fortune1:
  Conditions:
  - chance{c=<math.enchant_level*0.03+0.05>}
  Skills:
  - skill{s=see_miniblock-stone_blocks2}


see_miniblock-stone_blocks-fortune2:
