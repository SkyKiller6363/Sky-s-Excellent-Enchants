see:temper:
  Display: Temper
  Description: Does more damage the lower health you have
  Rarity: RARE
  MinLevel: 1
  MaxLevel: 5
  ValidSlots:
  - HAND
  SupportedItems: '#minecraft:enchantable/weapon'
  AnvilCost: 10
  Options:
    Enabled: true
    Cursed: false
    Treasure: true
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: false
  Enchanting:
    BookOffer: true
    Weight: 2
    MinCost:
      Base: 20
      PerLevel: 5
    MaxCost: 30
    Promised: true
    PrimaryItems:
    - '#minecraft:enchantable/melee_weapon'
  Skills:
  - modifyDamage{a=<math.(1-(player_health/player_max_health))*(0.25*enchant_level)>;action=ADDITIVE_MULTIPLIER;sync=true}
    @self ~onAttack
  - particle{particle=damage_indicator;a=<math.5+((1-(player_health/player_max_health))*15)>;hs=0.5;vs=0.5;y=1}
    @trigger ~onAttack
