see:duelist:
  Display: Duelist
  Description: Increases attack speed and grants a chance to disorient targets in close combat
  Rarity: RARE
  MinLevel: 1
  MaxLevel: 3
  ValidSlots:
  - HAND
  SupportedItems: '#minecraft:enchantable/sword'
  AnvilCost: 5
  Options:
    Enabled: true
    Treasure: false
    RandomLoot: true
    Tradeable: true
    TradedEquipment: true
    MobSpawnEquipment: true
  Enchanting:
    Weight: 4
    MinCost:
      Base: 20
      PerLevel: 5
    Promised: true
    BookOffer: true
    PrimaryItems:
    - '#minecraft:enchantable/sword'
  Attributes:
    MainHand:
    - ATTACK_SPEED <math.enchant_level*0.12> ADD
  Skills:
  - skill{s=see_duelist} @trigger ~onAttack
