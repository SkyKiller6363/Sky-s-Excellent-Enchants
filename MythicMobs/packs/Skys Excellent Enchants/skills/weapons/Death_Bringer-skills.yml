see_death_bringer:
  Cooldown: 6
  TriggerConditions:
  - (isPlayer || isLiving)
  Conditions:
  - healthpercent{p=<35}
  - chance{c=<math.enchant_level*0.06+0.08>}
  Skills:
  - damage{a=<math.enchant_level*2+2>;ignorearmor=true;damagecause=MAGIC} @trigger
  - throw{velocity=<math.enchant_level*3+6>;velocityY=<math.enchant_level+2>} @trigger
  - particle{p=smoke;a=40;hs=0.5;vs=0.8} @trigger
  - particle{p=soul;a=25;hs=0.5;vs=0.8} @trigger
  - sound{s=entity.wither.shoot;p=0.7;v=0.8} @self
