
see_thrifty_effects:
  Skills:
  - sudo{skill=[ - hide{d=600} @server ]}
  - delay 1
  - sudo{skill=[ - showentity @trigger ];cat=true}
  - aura{duration=600;name=dropeffect;i=5;
    ontick=[ - particles{particle=happy_villager;amount=2;hS=0.1;vS=0.1;audience=caster} ];
    components=[ - glow{glowcolor=RED} ]}
  - sudo{skill=[ - jump{v=0.5;repeat=12;repeatI=50}]}

  - sound{s=entity.experience_orb.pickup;v=0.6;p=1.4;audience=caster}


see_thrifty_mob:
  Conditions:
  - hasenchant{enchantment=looting;level=3} castInstead see_thrifty_mob-looting3
  - hasenchant{enchantment=looting;level=2} castInstead see_thrifty_mob-looting2
  - hasenchant{enchantment=looting;level=1} castInstead see_thrifty_mob-looting1
  - chance{c=<math.enchant_level*0.005>}
  Skills:
  - skill{s=see_thrifty_mob-drops}

see_thrifty_mob-looting1:
  Conditions:
  - chance{c=<math.enchant_level*0.005+0.015>}
  Skills:
  - skill{s=see_thrifty_mob-drops}
see_thrifty_mob-looting2:
  Conditions:
  - chance{c=<math.enchant_level*0.005+0.025>} 
  Skills:
  - skill{s=see_thrifty_mob-drops}
see_thrifty_mob-looting3:
  Conditions:
  - chance{c=<math.enchant_level*0.005+0.035>}
  Skills:
  - skill{s=see_thrifty_mob-drops}

