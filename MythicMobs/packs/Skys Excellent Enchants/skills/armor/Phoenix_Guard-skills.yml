see_phoenix_guard:
  Cooldown: 45
  Conditions:
  - healthpercent{p=<30%}
  - chance{c=<math.enchant_level*0.10+0.20>}
  Skills:
  - heal{amount=<math.enchant_level*2+4>;overhealth=true} 
  - potion{type=FIRE_RESISTANCE;l=0;duration=<math.enchant_level*60+80>;p=false;i=false} 
  - ignite{d=<math.enchant_level*20+40>} @trigger
  - particle{p=flame;a=35;hs=0.8;vs=0.8} @selflocation{y=1}
  - particle{p=heart;a=8;hs=0.5;vs=0.5} @selflocation{y=1}
  - sound{s=entity.blaze.shoot;p=1.25;v=1.5} 
  - actionmessage{m="<#ff7b22>Phoenix Guard <gray>saved you in a burst of flame."} @self ?varisset{var=caster.enchant_action_message}
