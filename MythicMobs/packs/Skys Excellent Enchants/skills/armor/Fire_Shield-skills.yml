see_fire_shield:
  Cooldown: 3
  Conditions:
  - chance{c=<math.enchant_level*0.07+0.15>}
  TriggerConditions:
  - (isPlayer || isLiving)
  Skills:
    - ignite{duration=<math.enchant_level*20>} @trigger
    - particle{particle=lava;a=2;hs=0.3;vs=0.5} @triggerlocation{y=1}
    - particle{particle=small_flame;amount=10;hs=0.3;vs=0.5} @triggerlocation{y=1}
    - particle{particle=flame;amount=5;hs=0.3;vs=0.5} @triggerlocation{y=1}
    - sound{s=item.firecharge.use;p=1.4;v=0.5}
    - am{m=<#da5a05>Fire Shield} @self ?varisset{var=caster.enchant_action_message}
    - sound{s=entity.experience_orb.pickup;v=0.6;p=1.4;audience=caster} @self ?varisset{var=caster.enchant_action_message}

